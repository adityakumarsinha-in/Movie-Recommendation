<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Movie Recommendation System</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="site">
      <header class="hero">
        <div class="hero-inner">
          <h1>Movie Recommendation System</h1>
          <p class="lead">Search titles, genres or themes — get similar taste suggestions.</p>
          <div class="search-wrap">
            <input id="query" placeholder="Search movie title or genre (e.g., action, romance, drama)" />
            <button id="btn">Search</button>
          </div>
          <div class="chips" id="chips">
            <button class="chip">action</button>
            <button class="chip">romance</button>
            <button class="chip">drama</button>
            <button class="chip">comedy</button>
            <button class="chip">thriller</button>
          </div>
        </div>
      </header>

      <main class="container">
        <section id="results" class="results"></section>
      </main>

      <footer class="footer">Made with ❤ • Aditya Kumar Sinha</footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
